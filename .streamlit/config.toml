[theme]
primaryColor = "#F63366"          # Цвет кнопок и активных элементов
backgroundColor = "#FFFFFF"       # Основной фон
secondaryBackgroundColor = "#F0F2F6" # Фон боковой панели (Sidebar)
textColor = "#262730"             # Цвет текста
font = "sans serif"               # Шрифт (sans serif, serif или mono)

[server]
# Автоматически обновлять страницу в браузере при сохранении кода (очень удобно!)
runOnSave = true
toolbarMode = "minimal"

[browser]
gatherUsageStats = false